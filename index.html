<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#faf7f2"> <!-- Using var(--color-cream) -->
    <title>دخول | نظام الحضور الذكي</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link href="styles/style.css" rel="stylesheet" />
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffab31",
                        "on-primary": "#1b1b1b",
                        "background": "#faf7f2",
                        "surface": "#ffffff"
                    },
                    fontFamily: {
                        sans: ['Tajawal', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: var(--color-cream);
            overflow-x: hidden;
        }

        /* Physics-based Tab Bar */
        .tab-indicator {
            position: absolute;
            top: 4px;
            bottom: 4px;
            right: 4px;
            width: calc(50% - 6px);
            border-radius: 12px;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1.15);
            z-index: 1;
        }

        .indicator-teacher {
            transform: translateX(0);
            background: var(--color-primary);
            box-shadow: none;
        }

        .indicator-student {
            transform: translateX(-100%);
            background: var(--color-primary);
            box-shadow: none;
        }

        .forms-wrapper {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1.15);
            width: 200%;
        }

        .form-section {
            width: 50%;
            flex-shrink: 0;
            transition: opacity 0.4s ease;
        }

        .tab-button {
            transition: color 0.4s ease, transform 0.1s ease;
        }

        .tab-button:active {
            transform: scale(0.95);
        }

        @keyframes animate-fade-in {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: animate-fade-in 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center py-6 sm:py-12 px-4 sm:px-6 text-gray-800 font-sans">
    <!-- Ambient Background -->
    <div class="liquid-glass-ambient">
        <div class="orb orb-primary"></div>
        <div class="orb orb-tertiary"></div>
        <div class="orb orb-accent"></div>
    </div>

    <div class="w-full max-w-full sm:max-w-md space-y-6 sm:space-y-8 relative z-10">
        <!-- Logo & Title -->
        <div class="text-center">
            <div
                class="liquid-glass-icon icon-primary w-20 h-20 sm:w-24 sm:h-24 rounded-xl mx-auto mb-4 sm:mb-6 border border-primary/20 flex items-center justify-center overflow-hidden">
                <img src="assets/brand-logo.png" alt="Logo" class="w-full h-full object-contain p-2" />
            </div>
            <h1 class="text-2xl sm:text-3xl font-bold refractive-text">بوابة الحضور الذكي</h1>
            <p class="text-gray-500 mt-2 sm:mt-3 text-xs sm:text-sm">مرحباً بك، يرجى اختيار نوع الدخول</p>
        </div>

        <!-- Tab Bar -->
        <div class="liquid-glass-tabbar flex gap-2 p-1 rounded-2xl relative">
            <div id="tabIndicator" class="tab-indicator indicator-teacher"></div>
            <button id="teacherTab" onclick="switchTab('teacher')"
                class="tab-button flex-1 py-3.5 rounded-xl font-bold relative z-10 text-on-primary">معلم / مدير</button>
            <button id="studentTab" onclick="switchTab('student')"
                class="tab-button flex-1 py-3.5 rounded-xl font-medium relative z-10 text-gray-500">طالب / ولي
                أمر</button>
        </div>

        <!-- Forms Container -->
        <div class="liquid-glass-container overflow-hidden rounded-xl">
            <div id="formsWrapper" class="forms-wrapper">
                <!-- Teacher Login Form -->
                <div id="teacherForm"
                    class="form-section liquid-glass liquid-glass-prominent p-6 sm:p-8 space-y-4 sm:space-y-6">
                    <div class="space-y-1 sm:space-y-2">
                        <label class="text-xs sm:text-sm font-medium text-gray-600 refractive-text">الرقم
                            الوزاري</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-gray-500">badge</span>
                            <input type="text" id="ministryId"
                                class="liquid-glass-input w-full rounded-xl pr-12 py-3 sm:py-3.5 text-xs sm:text-sm"
                                placeholder="أدخل رقمك الوزاري">
                        </div>
                    </div>
                    <div class="space-y-1 sm:space-y-2">
                        <label class="text-xs sm:text-sm font-medium text-gray-600 refractive-text">كلمة السر</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-gray-500">lock</span>
                            <input type="password" id="password"
                                class="liquid-glass-input w-full rounded-xl pr-12 py-3 sm:py-3.5 text-xs sm:text-sm"
                                placeholder="••••••••">
                        </div>
                    </div>
                    <button onclick="handleLogin()"
                        class="liquid-button liquid-button-prominent w-full py-3.5 sm:py-4 text-on-primary font-bold rounded-xl text-xs sm:text-sm">دخول
                        النظام</button>
                </div>

                <!-- Student Login Form -->
                <div id="studentForm"
                    class="form-section liquid-glass liquid-glass-prominent p-6 sm:p-8 space-y-4 sm:space-y-5">
                    <div class="space-y-1 sm:space-y-2">
                        <label class="text-xs sm:text-sm font-medium text-gray-600 refractive-text">الرقم الوطني للطالب
                            أو رقم هاتف ولي الأمر</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-gray-500">badge</span>
                            <input type="text" id="studentNationalId"
                                class="liquid-glass-input w-full rounded-xl pr-12 py-3 sm:py-3.5 text-xs sm:text-sm"
                                placeholder="أدخل الرقم الوطني أو رقم الهاتف">
                        </div>
                    </div>

                    <button onclick="handleStudentSearch()" id="searchBtn"
                        class="liquid-button liquid-button-prominent w-full py-3.5 sm:py-4 text-on-primary font-bold rounded-xl text-xs sm:text-sm">عرض
                        حالة الحضور</button>

                    <p class="text-[11px] text-center text-gray-500">يرجى إدخال الرقم الوطني للطالب أو رقم الهاتف المسجل
                        لولي الأمر للوصول.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="w-full max-w-md text-center py-8 relative z-10 space-y-2">
        <p class="text-gray-500 text-xs sm:text-sm">
            © 2026 حضوري — Hodoori. جميع الحقوق محفوظة.
        </p>
        <div class="flex justify-center gap-4 text-[11px] sm:text-xs">
            <a href="terms.html" class="text-primary hover:underline font-medium">شروط الاستخدام وحقوق الملكية</a>
            <span class="text-gray-300">|</span>
            <span class="text-gray-400">تطوير فريق حضوري</span>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="scripts/core-db.js"></script>
    <script src="scripts/core-auth.js"></script>
    <script src="scripts/core-ui.js"></script>
    <script src="scripts/utils-notifications.js"></script>
    <script>
        let allClasses = [];
        let allStudents = [];

        async function switchTab(type) {
            const tabs = ['teacherTab', 'studentTab'];
            const wrapper = document.getElementById('formsWrapper');
            const indicator = document.getElementById('tabIndicator');

            if (type === 'teacher') {
                indicator.classList.add('indicator-teacher');
                indicator.classList.remove('indicator-student');
                wrapper.style.transform = 'translateX(0)';
            } else {
                indicator.classList.remove('indicator-teacher');
                indicator.classList.add('indicator-student');
                // In RTL, to show the second item (Student), we slide right by 50% of the 200% width, which is 100% of the container width.
                wrapper.style.transform = 'translateX(50%)';
            }

            tabs.forEach(t => {
                const el = document.getElementById(t);
                if (t === type + 'Tab') {
                    el.classList.add('text-on-primary', 'font-bold');
                    el.classList.remove('text-gray-500', 'font-medium');
                } else {
                    el.classList.remove('text-on-primary', 'font-bold');
                    el.classList.add('text-gray-500', 'font-medium');
                }
            });

            // Handle opacity for a smoother feel
            document.getElementById('teacherForm').style.opacity = type === 'teacher' ? '1' : '0.3';
            document.getElementById('studentForm').style.opacity = type === 'student' ? '1' : '0.3';
        }



        async function handleLogin() {
            const mid = document.getElementById('ministryId').value;
            const pass = document.getElementById('password').value;

            const btn = event.currentTarget;
            UI.setLoading(true);
            btn.disabled = true;

            const result = await Auth.login(mid, pass);

            if (result.success) {
                UI.toast('تم الدخول بنجاح', 'success');
                setTimeout(() => {
                    if (result.user.role === 'ministry') {
                        window.location.href = 'dashboard-ministry.html';
                    } else if (result.user.role === 'admin') {
                        window.location.href = 'dashboard-admin.html';
                    } else {
                        window.location.href = 'dashboard-teacher.html';
                    }
                }, 1000);
            } else {
                UI.setLoading(false);
                btn.disabled = false;
                UI.toast(result.message, 'error');
            }
        }
        async function handleStudentSearch() {
            const input = document.getElementById('studentNationalId').value.trim();
            if (!input) {
                UI.toast('يرجى إدخال الرقم الوطني أو رقم الهاتف', 'error');
                return;
            }

            // Check if input is a phone number (Parent Login)
            const phoneRegex = /^07[789][0-9]{7}$/;
            if (phoneRegex.test(input)) {
                UI.setLoading(true);
                const btn = document.getElementById('searchBtn');
                btn.disabled = true;

                try {
                    await DB.init();
                    const allStudents = await DB.getStudents();
                    const myChildren = allStudents.filter(s => s.phone === input);

                    const linkedChildren = myChildren.map(s => s.academicId || s.id);
                    localStorage.setItem('parent_phone', input);
                    localStorage.setItem('linked_children', JSON.stringify(linkedChildren));

                    UI.toast('تم التعرف على رقم الهاتف، جاري توجيهك لبوابة أولياء الأمور...', 'success');
                    setTimeout(() => {
                        window.location.href = 'portal-parent.html';
                    }, 1000);
                } catch (e) {
                    console.error(e);
                    UI.setLoading(false);
                    btn.disabled = false;
                    UI.toast('حدث خطأ أثناء تسجيل الدخول', 'error');
                }
                return;
            }

            // Otherwise, treat as National ID (Student Login)
            const btn = document.getElementById('searchBtn');
            UI.setLoading(true);
            btn.disabled = true;

            try {
                await DB.init();
                const students = await DB.getStudents();
                const student = students.find(s => s.academicId === input || s.id === input);

                if (student) {
                    UI.toast('تم التحقق بنجاح، جاري التحميل...', 'success');
                    setTimeout(() => {
                        window.location.href = 'portal-student.html?id=' + (student.academicId || student.id);
                    }, 1000);
                } else {
                    UI.setLoading(false);
                    btn.disabled = false;
                    UI.toast('عذراً، لم يتم العثور على بيانات بهذا الرقم', 'error');
                }
            } catch (e) {
                console.error(e);
                UI.setLoading(false);
                btn.disabled = false;
                UI.toast('حدث خطأ أثناء البحث', 'error');
            }
        }

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.log('SW Registration failed', err));
            });
        }
    </script>
</body>

</html>
